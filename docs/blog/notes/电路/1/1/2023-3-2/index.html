    <h1 id="dian-lu-ji-ji-zong-dian-lu-mo-xing">电路及集总电路模型</h1>
<p><code>表述</code> 实际电路由<a rel="external" href="https://fleetinglore.github.io/%E5%90%8D%E8%AF%8D%E8%A1%A8/%E9%83%A8%E4%BB%B6.md">部件</a>和<a rel="external" href="https://fleetinglore.github.io/%E5%90%8D%E8%AF%8D%E8%A1%A8/%E6%99%B6%E4%BD%93.md">晶体</a>等器件相互连接组成。</p>
<p><code>定义</code> 由<a rel="external" href="https://fleetinglore.github.io/%E5%90%8D%E8%AF%8D%E8%A1%A8/%E9%9B%86%E6%80%BB%E7%94%B5%E8%B7%AF.md">集总电路</a>参数元件组成的电路，称为实际电路的集总电路模型，或径称之为集总电路。</p>
<p><code>表述</code> <a rel="external" href="https://fleetinglore.github.io/%E5%90%8D%E8%AF%8D%E8%A1%A8/%E9%9B%86%E6%80%BB%E5%81%87%E8%AE%BE.md">集总假设</a>为本书的基本假设。</p>
<p><code>表述</code> 集总电路 = <a rel="external" href="https://fleetinglore.github.io/%E5%90%8D%E8%AF%8D%E8%A1%A8/%E7%94%B5%E9%98%BB%E6%80%A7%E7%94%B5%E8%B7%AF.md">电阻性电路</a> or <a rel="external" href="https://fleetinglore.github.io/%E5%90%8D%E8%AF%8D%E8%A1%A8/%E5%8A%A8%E6%80%81%E7%94%B5%E8%B7%AF.md">动态电路</a></p>
<hr />
<p>注意正弦稳态电路也是动态电路。</p>
<hr />
<ol>
<li>
<p>具有相同的主要电磁性能的实际电路部件，在一定条件下可用同一电路模型表示。</p>
</li>
<li>
<p>同一实际电路部件在不同的应用表示下，其电路模型可以有不同的形式。</p>
</li>
</ol>
<p>（依据：集总假设）</p>
<hr />
<p>集总参数电路（简称电路） or 分布参数电流</p>
