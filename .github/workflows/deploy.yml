name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # main分支推送时触发部署
    tags:
      - 'template-v*'  # template标签推送时触发模版创建
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

# 并发控制 - 让两个任务可以同时运行
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # ========== 任务1: 创建template分支 (仅在打tag时运行) ==========
  create-template-branch:
    if: startsWith(github.ref, 'refs/tags/template-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create template branch
        run: |
          # 创建并切换到template分支
          git checkout -b template
          
          # 删除不需要的文件和目录
          echo "Removing content directory..."
          rm -rf content
          
          echo "Removing README.md..."
          rm -f README.md
          
          echo "Removing .github directory..."
          rm -rf .github
          
          echo "Removing static/lore directory..."
          rm -rf static/lore
          
          # 提交更改
          git add .
          git commit -m "Create template from ${{ github.ref_name }}"
          
          # 强制推送到template分支
          echo "Pushing to template branch..."
          git push origin template --force
          
          echo "✅ Template branch created successfully!"

  # ========== 任务2: 部署docs到gh-pages (仅在main分支推送时运行) ==========
  deploy-to-pages:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add .nojekyll file
        run: |
          touch docs/.nojekyll
          echo "✅ Added .nojekyll to disable Jekyll"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true  # 每次部署都保持gh-pages分支干净
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy docs to gh-pages - ${{ github.sha }}'
          enable_jekyll: false  # 禁用Jekyll

      - name: Output deployment info
        run: |
          echo "✅ Docs deployed to gh-pages branch!"
          echo "🌐 Your site will be available at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"