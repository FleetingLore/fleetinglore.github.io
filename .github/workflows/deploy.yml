name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 监听 main 分支的推送
    tags:
      - 'template-v*'  # 保留原来的 tag 触发
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

# 允许一个并发的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 原来的 template 分支创建任务
  create-template-branch:
    if: startsWith(github.ref, 'refs/tags/template-v')  # 只有 tag 推送时才运行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create template branch
        run: |
          git checkout -b template
          
          rm -rf content
          rm -f README.md
          rm -rf .github
          rm -rf static/lore
          
          git add .
          git commit -m "Create template from ${{ github.ref_name }}"
          git push origin template --force

  # 新增的部署任务 - 部署 docs 到 gh-pages
  deploy-to-pages:
    if: github.ref == 'refs/heads/main'  # 只有 main 分支推送时才运行
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add .nojekyll file
        run: touch docs/.nojekyll  # 确保禁用 Jekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'  # 上传 docs 目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4